<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وبلاگ سریع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f4f7fb; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #1e4663; color: white; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-btn { background: #ffb74d; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .post-card { background: white; padding: 15px 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .post-title { font-size: 1.4rem; color: #0c4e6e; margin-bottom: 5px; }
        .post-date { font-size: 0.7rem; color: gray; margin-bottom: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-box { background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 28px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 18px; }
        button { background: #1e4663; color: white; border: none; padding: 10px 15px; border-radius: 30px; cursor: pointer; margin-top: 5px; }
        .del-btn { background: #c0392b; padding: 4px 12px; font-size: 12px; margin-right: 10px; }
        hr { margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📝 وبلاگ من</h2>
        <button class="admin-btn" onclick="openPanel()">مدیریت</button>
    </div>
    <div id="postsArea"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div id="loginView">
            <h3>ورود به پنل</h3>
            <input type="password" id="passInput" placeholder="رمز مدیریت">
            <button onclick="checkLogin()">ورود</button>
            <p id="errMsg" style="color:red; font-size:12px; margin-top:8px"></p>
        </div>
        <div id="adminView" style="display:none">
            <h3>➕ نوشتن پست جدید</h3>
            <input type="text" id="newTitle" placeholder="عنوان">
            <textarea id="newBody" rows="3" placeholder="متن پست..."></textarea>
            <button onclick="addPost()">انتشار</button>
            <hr>
            <h3>🗑️ پست‌های موجود</h3>
            <div id="adminList"></div>
            <button onclick="logout()" style="background:gray; margin-top:15px">خروج</button>
        </div>
        <button onclick="closeModal()" style="background:#aaa; margin-top:12px">بستن</button>
    </div>
</div>

<script>
    let posts = JSON.parse(localStorage.getItem('blog') || '[]');
    if(posts.length === 0) posts.push({ id:1, title:"اولین پست", body:"به وبلاگ خوش آمدید", date:new Date().toLocaleString('fa-IR') });
    function save(){ localStorage.setItem('blog', JSON.stringify(posts)); showPosts(); }
    function showPosts(){
        const area = document.getElementById('postsArea');
        if(!posts.length) { area.innerHTML = '<div class="post-card">هیچ پستی نیست</div>'; return; }
        area.innerHTML = posts.map(p=> `<div class="post-card"><div class="post-title">${escapeHtml(p.title)}</div><div class="post-date">${p.date}</div><div>${escapeHtml(p.body).replace(/\n/g,'<br>')}</div></div>`).join('');
    }
    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
    function openPanel(){ document.getElementById('modal').style.display='flex'; document.getElementById('loginView').style.display='block'; document.getElementById('adminView').style.display='none'; document.getElementById('passInput').value=''; document.getElementById('errMsg').innerText=''; }
    function closeModal(){ document.getElementById('modal').style.display='none'; }
    function checkLogin(){ if(document.getElementById('passInput').value === '7646944949'){ document.getElementById('loginView').style.display='none'; document.getElementById('adminView').style.display='block'; renderAdminList(); } else { document.getElementById('errMsg').innerText='رمز اشتباه است'; } }
    function renderAdminList(){ const listDiv=document.getElementById('adminList'); listDiv.innerHTML=posts.map(p=> `<div style="margin:8px 0; display:flex; justify-content:space-between; align-items:center"><span>${escapeHtml(p.title)}</span><button class="del-btn" onclick="deletePost(${p.id})">حذف</button></div>`).join(''); }
    function deletePost(id){ posts = posts.filter(p=> p.id !== id); save(); renderAdminList(); }
    function addPost(){ let title=document.getElementById('newTitle').value.trim(); let body=document.getElementById('newBody').value.trim(); if(!title || !body){ alert('عنوان و متن را پر کنید'); return; } let newId = posts.length ? Math.max(...posts.map(p=>p.id))+1 : 1; posts.unshift({ id:newId, title, body, date:new Date().toLocaleString('fa-IR') }); save(); document.getElementById('newTitle').value=''; document.getElementById('newBody').value=''; renderAdminList(); }
    function logout(){ document.getElementById('loginView').style.display='block'; document.getElementById('adminView').style.display='none'; }
    save();
    window.onclick = function(e) { if(e.target === document.getElementById('modal')) closeModal(); }
</script>
</body>
</html>
