<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلتفرم وبلاگ دهی | با ادمین پنل کامل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', system-ui, Tahoma, sans-serif; }
        
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* هدر */
        .main-header { background: rgba(255,255,255,0.95); border-radius: 25px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo h1 { color: #667eea; font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar-small { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #667eea; }
        .login-btn, .register-btn, .admin-panel-btn { background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; }
        
        /* پروفایل کاربر */
        .user-profile-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #667eea; }
        
        /* بلاگ‌ها */
        .blogs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .blog-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s; }
        .blog-card:hover { transform: translateY(-5px); }
        .blog-cover { height: 150px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; }
        .blog-content { padding: 20px; }
        .blog-title { font-size: 1.3rem; color: #333; margin-bottom: 8px; }
        .blog-desc { color: #666; font-size: 0.85rem; }
        
        /* پست‌ها */
        .posts-list { display: flex; flex-direction: column; gap: 15px; }
        .post-item { background: #f9f9f9; padding: 15px; border-radius: 15px; }
        .post-title { font-size: 1.2rem; color: #667eea; margin-bottom: 8px; }
        
        /* مودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 550px; border-radius: 25px; padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin-left: 10px; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .btn-secondary { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        
        .back-btn { background: #95a5a6; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-bottom: 20px; }
        .user-clickable { cursor: pointer; transition: 0.2s; }
        .user-clickable:hover { opacity: 0.8; transform: scale(1.02); }
        
        @media (max-width: 768px) {
            .blogs-grid { grid-template-columns: 1fr; }
            .main-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="logo">
            <h1>📝 پلتفرم وبلاگ دهی</h1>
            <p>بلاگ خود را بسازید و با دیگران به اشتراک بگذارید</p>
        </div>
        <div id="headerUserInfo"></div>
    </div>

    <div id="mainContent">
        <div id="usersListContainer" class="blogs-grid"></div>
        <div id="userBlogsContainer" style="display:none"></div>
        <div id="singleBlogContainer" style="display:none"></div>
    </div>
</div>

<!-- مودال ادمین پنل -->
<div id="adminModal" class="modal">
    <div class="modal-content">
        <div id="adminLoginSection">
            <h2>🔐 ورود به پنل مدیریت</h2>
            <div class="form-group">
                <label>رمز مدیریت</label>
                <input type="password" id="adminPassword" placeholder="رمز را وارد کنید">
            </div>
            <button class="btn-primary" onclick="checkAdminLogin()">ورود</button>
            <button class="btn-secondary" onclick="closeModal('adminModal')">بستن</button>
            <p id="adminLoginError" style="color:red; margin-top:10px"></p>
        </div>
        
        <div id="adminPanelSection" style="display:none">
            <h2>👑 پنل مدیریت کاربران</h2>
            <div class="form-group">
                <label>نام کاربری جدید</label>
                <input type="text" id="newUsername" placeholder="نام کاربری">
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" id="newPassword" placeholder="رمز عبور">
            </div>
            <div class="form-group">
                <label>عکس پروفایل</label>
                <input type="file" id="adminAvatarInput" accept="image/*">
                <div id="adminAvatarPreview" style="margin-top:10px"></div>
            </div>
            <button class="btn-primary" onclick="createUserByAdmin()">➕ ساخت کاربر جدید</button>
            <hr style="margin: 20px 0">
            <h3>📋 لیست کاربران</h3>
            <div id="adminUsersList"></div>
            <button class="btn-secondary" onclick="logoutAdmin()" style="margin-top:20px">🚪 خروج از پنل</button>
        </div>
    </div>
</div>

<!-- مودال ساخت بلاگ جدید -->
<div id="createBlogModal" class="modal">
    <div class="modal-content">
        <h2>➕ ساخت بلاگ جدید</h2>
        <div class="form-group">
            <label>عنوان بلاگ</label>
            <input type="text" id="blogTitle" placeholder="عنوان بلاگ">
        </div>
        <div class="form-group">
            <label>توضیحات</label>
            <textarea id="blogDesc" rows="3" placeholder="درباره بلاگ خود بنویسید..."></textarea>
        </div>
        <button class="btn-primary" onclick="createBlog()">ایجاد بلاگ</button>
        <button class="btn-secondary" onclick="closeModal('createBlogModal')">بستن</button>
    </div>
</div>

<!-- مودال ساخت پست جدید -->
<div id="createPostModal" class="modal">
    <div class="modal-content">
        <h2>✏️ نوشتن پست جدید</h2>
        <div class="form-group">
            <label>عنوان پست</label>
            <input type="text" id="postTitle" placeholder="عنوان">
        </div>
        <div class="form-group">
            <label>متن پست</label>
            <textarea id="postBody" rows="5" placeholder="متن پست..."></textarea>
        </div>
        <button class="btn-primary" onclick="createPost()">انتشار پست</button>
        <button class="btn-secondary" onclick="closeModal('createPostModal')">بستن</button>
    </div>
</div>

<script>
    // ==================== دیتابیس ====================
    let users = [];
    let blogs = [];
    let posts = [];
    let currentUser = null;
    let currentViewUser = null;
    let currentBlog = null;
    let isAdminLoggedIn = false;
    
    // بارگذاری داده
    function loadData() {
        const savedUsers = localStorage.getItem('blog_platform_users');
        const savedBlogs = localStorage.getItem('blog_platform_blogs');
        const savedPosts = localStorage.getItem('blog_platform_posts');
        const savedSession = localStorage.getItem('blog_platform_session');
        
        if(savedUsers) {
            users = JSON.parse(savedUsers);
        } else {
            // کاربر پیش‌فرض برای تست
            users = [{
                id: 1,
                username: "مدیر سایت",
                password: "123456",
                avatar: "👑"
            }];
            saveUsers();
        }
        
        if(savedBlogs) {
            blogs = JSON.parse(savedBlogs);
        } else {
            blogs = [];
        }
        
        if(savedPosts) {
            posts = JSON.parse(savedPosts);
        } else {
            posts = [];
        }
        
        if(savedSession) {
            const session = JSON.parse(savedSession);
            if(session && session.username) {
                const user = users.find(u => u.username === session.username);
                if(user) currentUser = user;
            }
        }
        
        renderAll();
    }
    
    function saveUsers() { localStorage.setItem('blog_platform_users', JSON.stringify(users)); }
    function saveBlogs() { localStorage.setItem('blog_platform_blogs', JSON.stringify(blogs)); }
    function savePosts() { localStorage.setItem('blog_platform_posts', JSON.stringify(posts)); }
    function saveSession() { localStorage.setItem('blog_platform_session', JSON.stringify(currentUser ? {username: currentUser.username} : null)); }
    
    function saveAll() {
        saveUsers();
        saveBlogs();
        savePosts();
        saveSession();
        renderAll();
    }
    
    // نمایش همه کاربران در صفحه اصلی
    function renderUsersList() {
        const container = document.getElementById('usersListContainer');
        if(users.length === 0) {
            container.innerHTML = '<div style="background:white; border-radius:20px; padding:50px; text-align:center">📭 هیچ کاربری وجود ندارد</div>';
            return;
        }
        
        container.innerHTML = users.map(user => `
            <div class="blog-card user-clickable" onclick="viewUserBlogs(${user.id})">
                <div class="blog-cover">${user.avatar && !user.avatar.startsWith('data') ? user.avatar : '👤'}</div>
                <div class="blog-content">
                    <h3 class="blog-title">${escapeHtml(user.username)}</h3>
                    <p class="blog-desc">${getUserBlogsCount(user.id)} بلاگ | ${getUserPostsCount(user.id)} پست</p>
                </div>
            </div>
        `).join('');
    }
    
    // نمایش بلاگ‌های یک کاربر
    function viewUserBlogs(userId) {
        currentViewUser = users.find(u => u.id === userId);
        if(!currentViewUser) return;
        
        const userBlogs = blogs.filter(b => b.userId === userId);
        
        const container = document.getElementById('userBlogsContainer');
        container.innerHTML = `
            <div class="user-profile-card">
                <div class="profile-avatar">${currentViewUser.avatar && !currentViewUser.avatar.startsWith('data') ? currentViewUser.avatar : '👤'}</div>
                <div>
                    <h2>${escapeHtml(currentViewUser.username)}</h2>
                    <p>${userBlogs.length} بلاگ | ${getUserPostsCount(userId)} پست</p>
                </div>
            </div>
            <div style="margin-bottom:20px">
                ${currentUser && currentUser.id === userId ? '<button class="btn-primary" onclick="openCreateBlogModal()">➕ ساخت بلاگ جدید</button>' : ''}
                <button class="back-btn" onclick="backToUsers()">← بازگشت به لیست کاربران</button>
            </div>
            <div class="blogs-grid" id="userBlogsGrid"></div>
        `;
        
        const blogsGrid = document.getElementById('userBlogsGrid');
        if(userBlogs.length === 0) {
            blogsGrid.innerHTML = '<div style="background:white; border-radius:20px; padding:50px; text-align:center">📭 هنوز بلاگی ساخته نشده است</div>';
        } else {
            blogsGrid.innerHTML = userBlogs.map(blog => `
                <div class="blog-card" onclick="viewBlog(${blog.id})">
                    <div class="blog-cover">📖</div>
                    <div class="blog-content">
                        <h3 class="blog-title">${escapeHtml(blog.title)}</h3>
                        <p class="blog-desc">${escapeHtml(blog.description.substring(0, 80))}${blog.description.length > 80 ? '...' : ''}</p>
                        <small>${getBlogPostsCount(blog.id)} پست</small>
                    </div>
                </div>
            `).join('');
        }
        
        document.getElementById('usersListContainer').style.display = 'none';
        document.getElementById('userBlogsContainer').style.display = 'block';
        document.getElementById('singleBlogContainer').style.display = 'none';
    }
    
    // نمایش یک بلاگ با پست‌هایش
    function viewBlog(blogId) {
        currentBlog = blogs.find(b => b.id === blogId);
        if(!currentBlog) return;
        
        const blogPosts = posts.filter(p => p.blogId === blogId);
        const blogOwner = users.find(u => u.id === currentBlog.userId);
        
        const container = document.getElementById('singleBlogContainer');
        container.innerHTML = `
            <div class="user-profile-card">
                <div class="profile-avatar">${blogOwner && blogOwner.avatar && !blogOwner.avatar.startsWith('data') ? blogOwner.avatar : '👤'}</div>
                <div>
                    <h2>${escapeHtml(currentBlog.title)}</h2>
                    <p>نویسنده: <strong class="user-clickable" onclick="viewUserBlogs(${blogOwner.id})">${escapeHtml(blogOwner.username)}</strong></p>
                    <p>${escapeHtml(currentBlog.description)}</p>
                </div>
            </div>
            <div style="margin-bottom:20px">
                ${currentUser && currentUser.id === blogOwner.id ? '<button class="btn-primary" onclick="openCreatePostModal()">✏️ نوشتن پست جدید</button>' : ''}
                <button class="back-btn" onclick="viewUserBlogs(${blogOwner.id})">← بازگشت به بلاگ‌های ${escapeHtml(blogOwner.username)}</button>
            </div>
            <div class="posts-list" id="blogPostsList"></div>
        `;
        
        const postsList = document.getElementById('blogPostsList');
        if(blogPosts.length === 0) {
            postsList.innerHTML = '<div style="background:white; border-radius:20px; padding:50px; text-align:center">📭 هنوز پستی در این بلاگ منتشر نشده است</div>';
        } else {
            postsList.innerHTML = blogPosts.map(post => `
                <div class="post-item">
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    <p>${escapeHtml(post.body).replace(/\n/g, '<br>')}</p>
                    <small style="color:#999">📅 ${post.date}</small>
                    ${currentUser && currentUser.id === blogOwner.id ? `<button class="btn-danger" style="margin-top:10px" onclick="deletePost(${post.id})">🗑️ حذف پست</button>` : ''}
                </div>
            `).join('');
        }
        
        document.getElementById('usersListContainer').style.display = 'none';
        document.getElementById('userBlogsContainer').style.display = 'none';
        document.getElementById('singleBlogContainer').style.display = 'block';
    }
    
    // ساخت بلاگ جدید
    function createBlog() {
        const title = document.getElementById('blogTitle').value.trim();
        const description = document.getElementById('blogDesc').value.trim();
        
        if(!title) {
            alert('لطفاً عنوان بلاگ را وارد کنید');
            return;
        }
        
        const newBlog = {
            id: Date.now(),
            userId: currentUser.id,
            title: title,
            description: description || 'بدون توضیحات',
            date: new Date().toLocaleString('fa-IR')
        };
        
        blogs.push(newBlog);
        saveBlogs();
        closeModal('createBlogModal');
        document.getElementById('blogTitle').value = '';
        document.getElementById('blogDesc').value = '';
        viewUserBlogs(currentUser.id);
    }
    
    // ساخت پست جدید
    function createPost() {
        const title = document.getElementById('postTitle').value.trim();
        const body = document.getElementById('postBody').value.trim();
        
        if(!title || !body) {
            alert('لطفاً عنوان و متن پست را وارد کنید');
            return;
        }
        
        const newPost = {
            id: Date.now(),
            blogId: currentBlog.id,
            userId: currentUser.id,
            title: title,
            body: body,
            date: new Date().toLocaleString('fa-IR')
        };
        
        posts.push(newPost);
        savePosts();
        closeModal('createPostModal');
        document.getElementById('postTitle').value = '';
        document.getElementById('postBody').value = '';
        viewBlog(currentBlog.id);
    }
    
    // حذف پست
    function deletePost(postId) {
        if(confirm('آیا از حذف این پست مطمئن هستید؟')) {
            posts = posts.filter(p => p.id !== postId);
            savePosts();
            viewBlog(currentBlog.id);
        }
    }
    
    // آمار
    function getUserBlogsCount(userId) { return blogs.filter(b => b.userId === userId).length; }
    function getUserPostsCount(userId) { return posts.filter(p => p.userId === userId).length; }
    function getBlogPostsCount(blogId) { return posts.filter(p => p.blogId === blogId).length; }
    
    // بازگشت به لیست کاربران
    function backToUsers() {
        currentViewUser = null;
        currentBlog = null;
        document.getElementById('usersListContainer').style.display = 'grid';
        document.getElementById('userBlogsContainer').style.display = 'none';
        document.getElementById('singleBlogContainer').style.display = 'none';
        renderUsersList();
    }
    
    // ==================== احراز هویت ====================
    function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const avatarFile = document.getElementById('avatarInput').files[0];
        
        if(!username || !password) {
            alert('نام کاربری و رمز عبور را وارد کنید');
            return;
        }
        
        if(users.find(u => u.username === username)) {
            alert('این نام کاربری قبلاً ثبت شده است');
            return;
        }
        
        let avatar = '👤';
        if(avatarFile) {
            const reader = new FileReader();
            reader.onload = function(e) {
                avatar = e.target.result;
                createUser(username, password, avatar);
            };
            reader.readAsDataURL(avatarFile);
        } else {
            createUser(username, password, avatar);
        }
    }
    
    function createUser(username, password, avatar) {
        const newUser = {
            id: Date.now(),
            username: username,
            password: password,
            avatar: avatar
        };
        users.push(newUser);
        saveUsers();
        closeModal('authModal');
        alert('ثبت نام با موفقیت انجام شد! اکنون وارد شوید.');
        openLoginModal();
    }
    
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        const user = users.find(u => u.username === username && u.password === password);
        if(user) {
            currentUser = user;
            saveSession();
            closeModal('authModal');
            renderAll();
        } else {
            alert('نام کاربری یا رمز عبور اشتباه است');
