<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وبلاگ پیشرفته | مدیریت کامل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', system-ui, Tahoma, sans-serif; }
        
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* هدر */
        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .site-title h1 { color: #667eea; font-size: 1.8rem; }
        .site-title p { color: #666; font-size: 0.85rem; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px 15px; border: 2px solid #ddd; border-radius: 25px; width: 200px; }
        .search-box button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        .admin-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
        .admin-btn:hover { transform: scale(1.05); }
        
        /* فیلتر دسته‌بندی */
        .categories { background: white; border-radius: 20px; padding: 15px; margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap; }
        .cat-btn { background: #f0f0f0; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .cat-btn.active { background: #667eea; color: white; }
        .cat-btn:hover { background: #764ba2; color: white; }
        
        /* پست‌ها */
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .post-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .post-card:hover { transform: translateY(-5px); }
        .post-image { width: 100%; height: 200px; object-fit: cover; background: linear-gradient(135deg, #667eea, #764ba2); }
        .post-content { padding: 20px; }
        .post-category { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; margin-bottom: 10px; }
        .post-title { font-size: 1.4rem; color: #333; margin-bottom: 10px; }
        .post-meta { display: flex; justify-content: space-between; color: #888; font-size: 0.8rem; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .post-excerpt { color: #666; line-height: 1.6; margin-bottom: 15px; }
        .read-more { color: #667eea; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        /* مودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 700px; border-radius: 25px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
        .form-group textarea { min-height: 150px; resize: vertical; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .btn-secondary { background: #95a5a6; }
        
        /* کامنت‌ها */
        .comments-section { margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
        .comment { background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .comment-author { font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .comment-date { font-size: 0.7rem; color: #999; }
        .add-comment textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 12px; margin-top: 10px; }
        
        /* آمار */
        .stats { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 20px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-around; text-align: center; }
        .stat-item h3 { font-size: 2rem; }
        
        /* پاسخگو */
        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; }
            .search-box { width: 100%; }
            .search-box input { flex: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="site-title">
            <h1>📝 وبلاگ پیشرفته</h1>
            <p>با مدیریت کامل، کامنت، دسته‌بندی و آمار</p>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجوی پست...">
            <button onclick="searchPosts()">🔍 جستجو</button>
        </div>
        <button class="admin-btn" onclick="openAdminPanel()">👑 پنل مدیریت</button>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-item"><h3 id="totalPosts">0</h3><p>کل پست‌ها</p></div>
        <div class="stat-item"><h3 id="totalComments">0</h3><p>کامنت‌ها</p></div>
        <div class="stat-item"><h3 id="totalViews">0</h3><p>بازدیدها</p></div>
    </div>
    
    <div class="categories" id="categoriesFilter"></div>
    <div id="postsContainer" class="posts-grid"></div>
</div>

<!-- مودال پنل مدیریت -->
<div id="adminModal" class="modal">
    <div class="modal-content">
        <div id="loginSection">
            <h2>🔐 ورود به پنل مدیریت</h2>
            <div class="form-group">
                <label>رمز مدیریت</label>
                <input type="password" id="adminPassword" placeholder="رمز را وارد کنید">
            </div>
            <button class="btn-primary" onclick="checkAdminLogin()">ورود</button>
            <button class="btn-secondary" onclick="closeModal('adminModal')">بستن</button>
            <p id="loginError" style="color:red; margin-top:10px"></p>
        </div>
        
        <div id="adminSection" style="display:none">
            <h2>📊 پنل مدیریت</h2>
            <div class="form-group">
                <label>عنوان پست</label>
                <input type="text" id="postTitle" placeholder="عنوان">
            </div>
            <div class="form-group">
                <label>دسته‌بندی</label>
                <select id="postCategory">
                    <option>عمومی</option>
                    <option>برنامه‌نویسی</option>
                    <option>زندگی</option>
                    <option>تکنولوژی</option>
                    <option>سفر</option>
                </select>
            </div>
            <div class="form-group">
                <label>متن پست</label>
                <textarea id="postBody" placeholder="متن کامل پست..."></textarea>
            </div>
            <div class="form-group">
                <label>آدرس تصویر (اختیاری)</label>
                <input type="text" id="postImage" placeholder="https://example.com/image.jpg">
            </div>
            <button class="btn-primary" onclick="addOrUpdatePost()">➕ انتشار پست</button>
            <button class="btn-secondary" onclick="cancelEdit()">❌ انصراف</button>
            <hr style="margin: 20px 0">
            <h3>📋 مدیریت پست‌ها</h3>
            <div id="adminPostsList"></div>
            <button class="btn-secondary" onclick="logoutAdmin()" style="margin-top:20px">🚪 خروج از پنل</button>
        </div>
    </div>
</div>

<!-- مودال نمایش کامل پست و کامنت‌ها -->
<div id="postModal" class="modal">
    <div class="modal-content" id="postModalContent"></div>
</div>

<script>
    // دیتابیس محلی
    let posts = JSON.parse(localStorage.getItem('blog_posts') || '[]');
    let comments = JSON.parse(localStorage.getItem('blog_comments') || '[]');
    let views = JSON.parse(localStorage.getItem('blog_views') || '{}');
    let editingId = null;
    let isAdmin = false;
    let currentCategory = 'همه';
    let searchQuery = '';
    
    // دسته‌بندی‌ها
    const categories = ['همه', 'برنامه‌نویسی', 'زندگی', 'تکنولوژی', 'سفر'];
    
    // پست پیش‌فرض
    if(posts.length === 0) {
        posts.push({
            id: 1,
            title: "به وبلاگ من خوش آمدید!",
            category: "عمومی",
            body: "این یک وبلاگ پیشرفته با امکانات کامل است. شما می‌توانید پست بنویسید، کامنت بگذارید، دسته‌بندی کنید و خیلی چیزهای دیگر. رمز پنل مدیریت: 7646944949",
            image: "",
            date: new Date().toLocaleString('fa-IR'),
            views: 0
        });
        saveData();
    }
    
    function saveData() {
        localStorage.setItem('blog_posts', JSON.stringify(posts));
        localStorage.setItem('blog_comments', JSON.stringify(comments));
        localStorage.setItem('blog_views', JSON.stringify(views));
        renderAll();
    }
    
    function renderAll() {
        renderCategories();
        renderPosts();
        updateStats();
    }
    
    function renderCategories() {
        const container = document.getElementById('categoriesFilter');
        container.innerHTML = categories.map(cat => 
            `<button class="cat-btn ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>`
        ).join('');
    }
    
    function filterByCategory(cat) {
        currentCategory = cat;
        renderPosts();
        renderCategories();
    }
    
    function searchPosts() {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        renderPosts();
    }
    
    function renderPosts() {
        let filtered = posts;
        
        // فیلتر دسته‌بندی
        if(currentCategory !== 'همه') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        
        // فیلتر جستجو
        if(searchQuery) {
            filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery) || p.body.toLowerCase().includes(searchQuery));
        }
        
        const container = document.getElementById('postsContainer');
        if(filtered.length === 0) {
            container.innerHTML = '<div style="background:white; border-radius:20px; padding:50px; text-align:center">😔 پستی یافت نشد</div>';
            return;
        }
        
        container.innerHTML = filtered.map(post => `
            <div class="post-card">
                ${post.image ? `<img src="${post.image}" class="post-image" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">` : '<div class="post-image" style="display:flex;align-items:center;justify-content:center;color:white">📝 تصویر پست</div>'}
                <div class="post-content">
                    <span class="post-category">${post.category}</span>
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    <div class="post-meta">
                        <span>📅 ${post.date}</span>
                        <span>👁️ ${views[post.id] || 0} بازدید</span>
                    </div>
                    <div class="post-excerpt">${escapeHtml(post.body.substring(0, 150))}${post.body.length > 150 ? '...' : ''}</div>
                    <a class="read-more" onclick="viewPost(${post.id})">ادامه مطلب →</a>
                </div>
            </div>
        `).join('');
    }
    
    function viewPost(id) {
        // افزایش بازدید
        views[id] = (views[id] || 0) + 1;
        saveData();
        
        const post = posts.find(p => p.id === id);
        if(!post) return;
        
        const postComments = comments.filter(c => c.postId === id);
        
        const modalContent = document.getElementById('postModalContent');
        modalContent.innerHTML = `
            <h2 style="color:#667eea">${escapeHtml(post.title)}</h2>
            <span class="post-category" style="margin:10px 0;display:inline-block">${post.category}</span>
            <div class="post-meta" style="margin:10px 0">📅 ${post.date} | 👁️ ${views[id] || 0} بازدید</div>
            <div style="line-height:1.8; margin:20px 0">${escapeHtml(post.body).replace(/\n/g, '<br>')}</div>
            
            <div class="comments-section">
                <h3>💬 نظرات (${postComments.length})</h3>
                <div id="commentsList">
                    ${postComments.map(c => `
                        <div class="comment">
                            <div class="comment-author">${escapeHtml(c.author)}</div>
                            <div class="comment-date">${c.date}</div>
                            <p>${escapeHtml(c.text)}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="add-comment">
                    <h4>نظر خود را بنویسید</h4>
                    <input type="text" id="commentName" placeholder="نام شما" style="width:100%; padding:8px; margin:5px 0; border:1px solid #ddd; border-radius:10px">
                    <textarea id="commentText" rows="3" placeholder="نظر شما..."></textarea>
                    <button class="btn-primary" onclick="addComment(${id})" style="margin-top:10px">ارسال نظر</button>
                </div>
            </div>
            <button class="btn-secondary" onclick="closeModal('postModal')" style="margin-top:20px">بستن</button>
        `;
        
        document.getElementById('postModal').style.display = 'flex';
    }
    
    function addComment(postId) {
        const author = document.getElementById('commentName').value.trim();
        const text = document.getElementById('commentText').value.trim();
        
        if(!author || !text) {
            alert('لطفاً نام و متن نظر را وارد کنید');
            return;
        }
        
        comments.push({
            id: Date.now(),
            postId: postId,
            author: author,
            text: text,
            date: new Date().toLocaleString('fa-IR')
        });
        
        saveData();
        document.getElementById('commentText').value = '';
        viewPost(postId); // رفرش مودال
    }
    
    function openAdminPanel() {
        document.getElementById('adminModal').style.display = 'flex';
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerHTML = '';
    }
    
    function checkAdminLogin() {
        const pass = document.getElementById('adminPassword').value;
        if(pass === '7646944949') {
            isAdmin = true;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            renderAdminPostsList();
        } else {
            document.getElementById('loginError').innerHTML = '❌ رمز اشتباه است!';
        }
    }
    
    function renderAdminPostsList() {
        const container = document.getElementById('adminPostsList');
        container.innerHTML = posts.map(post => `
            <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:12px">
                <strong>${escapeHtml(post.title)}</strong> (${post.category})
                <div style="margin-top:8px">
                    <button class="btn-primary" style="padding:5px 12px; font-size:12px" onclick="editPost(${post.id})">✏️ ویرایش</button>
                    <button class="btn-danger" onclick="deletePost(${post.id})">🗑️ حذف</button>
                </div>
            </div>
        `).join('');
    }
    
    function editPost(id) {
        const post = posts.find(p => p.id === id);
        if(post) {
            editingId = id;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postCategory').value = post.category;
            document.getElementById('postBody').value = post.body;
            document.getElementById('postImage').value = post.image || '';
        }
    }
    
    function addOrUpdatePost() {
        const title = document.getElementById('postTitle').value.trim();
        const category = document.getElementById('postCategory').value;
        const body = document.getElementById('postBody').value.trim();
        const image = document.getElementById('postImage').value;
        
        if(!title || !body) {
            alert('عنوان و متن پست الزامی است');
            return;
        }
        
        if(editingId) {
            // ویرایش
            const index = posts.findIndex(p => p.id === editingId);
            posts[index] = {
                ...posts[index],
                title, category, body, image
            };
            editingId = null;
        } else {
            // پست جدید
            posts.unshift({
                id: Date.now(),
                title, category, body, image,
                date: new Date().toLocaleString('fa-IR'),
                views: 0
            });
        }
        
        saveData();
        clearPostForm();
        renderAdminPostsList();
        alert('پست با موفقیت ذخیره شد');
    }
    
    function deletePost(id) {
        if(confirm('آیا از حذف این پست مطمئن هستید؟')) {
            posts = posts.filter(p => p.id !== id);
            comments = comments.filter(c => c.postId !== id);
            saveData();
            renderAdminPostsList();
        }
    }
    
    function cancelEdit() {
        editingId = null;
        clearPostForm();
    }
    
    function clearPostForm() {
        document.getElementById('postTitle').value = '';
        document.getElementById('postCategory').value = 'عمومی';
        document.getElementById('postBody').value = '';
        document.getElementById('postImage').value = '';
    }
    
    function logoutAdmin() {
        isAdmin = false;
        openAdminPanel();
    }
    
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }
    
    function updateStats() {
        document.getElementById('totalPosts').innerText = posts.length;
        document.getElementById('totalComments').innerText = comments.length;
        const totalViews = Object.values(views).reduce((a,b) => a+b, 0);
        document.getElementById('totalViews').innerText = totalViews;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return {'&':'&amp;', '<':'&lt;', '>':'&gt;'}[m];
        });
    }
    
    // بستن مودال با کلیک بیرون
    window.onclick = function(e) {
        if(e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
        }
    }
    
    // اجرای اولیه
    renderAll();
</script>
</body>
</html>
